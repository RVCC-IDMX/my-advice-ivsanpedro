<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Recommender</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
  </head>

  <body>
    <header>
      <h1>Workout Recommender</h1>
      <div class="subtitle">
        Find the perfect workout for your goals and equipment!
      </div>
    </header>
    <main class="main-container">
      <section class="left-col">
        <form id="preference-form" autocomplete="off">
          <div>
            <label for="type">Workout Type</label>
            <select id="type" name="type">
              <option value="">Any Type</option>
              <option>Arms</option>
              <option>Legs</option>
              <option>Abs</option>
              <option>Chest</option>
              <option>Back</option>
              <option>Shoulders</option>
              <option>Calves</option>
              <option>Cardio</option>
            </select>
          </div>
          <div>
            <label for="target">Target Area</label>
            <select id="target" name="target">
              <option value="">Any Area</option>
              <option>Biceps brachii</option>
              <option>Anterior deltoid</option>
              <option>Serratus anterior</option>
              <option>Pectoralis major</option>
              <option>Triceps brachii</option>
              <option>Rectus abdominis</option>
              <option>Gastrocnemius</option>
              <option>Gluteus maximus</option>
              <option>Trapezius</option>
              <option>Quadriceps femoris</option>
              <option>Biceps femoris</option>
              <option>Latissimus dorsi</option>
              <option>Brachialis</option>
              <option>Obliquus externus</option>
              <option>Soleus</option>
              <option>Infraspinatus</option>
            </select>
          </div>
          <div>
            <label for="equipment">Equipment</label>
            <select id="equipment" name="equipment">
              <option value="">Any Equipment</option>
              <option>Barbell</option>
              <option>SZ-Bar</option>
              <option>Dumbbell</option>
              <option>Gym mat</option>
              <option>Swiss Ball</option>
              <option>Pull-up bar</option>
              <option>none (bodyweight)</option>
              <option>Bench</option>
              <option>Incline bench</option>
              <option>Kettleball</option>
            </select>
          </div>
          <div>
            <label for="duration">Duration</label>
            <select id="duration" name="duration">
              <option value="">Any Duration</option>
              <option>15 minutes</option>
              <option>30 minutes</option>
              <option>45 minutes</option>
              <option>60+ minutes</option>
            </select>
          </div>
          <div>
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" name="difficulty">
              <option value="">Any Difficulty</option>
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
            </select>
          </div>
          <button type="submit">Find Workout</button>
        </form>
      </section>
      <section class="right-col">
        <div id="results-list" class="results-list">
          Your recommended workouts will appear here. Click the workout for more
          details 🏋🏻‍♀️
        </div>
        <div id="detail-view" class="hidden"></div>
      </section>
    </main>
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
